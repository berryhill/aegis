state_dir: ./.aegis/state
runtime_default: hermes
hermes_executable: hermes
principal:
  id: principal-1
  name: Example Principal
  uid: "REPLACE_WITH_LOCAL_UID"
  user: REPLACE_WITH_LOCAL_USERNAME
  auth_ttl: 15m
api:
  listen: 127.0.0.1:8443
  # Set for kernel-authenticated local API callers. TCP bearer tokens only
  # authenticate transport and cannot grant principal authority.
  unix_socket: ""
  token: CHANGE-ME-TO-A-LONG-RANDOM-SECRET
  # Optional TCP TLS identity; configure both files together. Not used for Unix sockets.
  tls_cert_file: ""
  tls_key_file: ""
  read_timeout: 15s
  write_timeout: 30s
  shutdown_timeout: 10s
  max_body_bytes: 1048576
retention:
  design_homes: false
  session_homes: false
audit:
  # Put this on a separately protected retention boundary in production.
  checkpoint_dir: ./.aegis/checkpoints
manager:
  enabled: true
  runtime: hermes
  security_context: secrets-manager
  cleanup_timeout: 10s
  hermes:
    context_length: 65536
    gateway_start_timeout: 20s
    turn_timeout: 5m
    maximum_response_bytes: 1048576
  inference:
    runtime: ollama
    mode: managed
    executable: ollama
    # Empty until an exact local artifact passes the opt-in conformance suite.
    model: ""
    model_digest: ""
    certification: ""
    keep_alive: 5m
    start_timeout: 30s
    request_timeout: 5m
    maximum_request_bytes: 4194304
    maximum_response_bytes: 4194304
  ingress:
    maximum_message_bytes: 262144
    maximum_message_runes: 262144
    scan_timeout: 250ms
    bounded_decode_depth: 2
  transcript:
    retention: session
credentials:
  references: {}
  # Provider authentication is separate from caller authentication.
  # design_provider: openai
  # provider_auth:
  #   openai: {type: environment, source_env: OPENAI_API_KEY, target_env: OPENAI_API_KEY}
  provider_auth: {}
  # Optional encrypted bbolt credential authority. Production services should
  # use custody: systemd with LoadCredentialEncrypted and kek_credential.
  # authority:
  #   database: ./.aegis/state/authority.db
  #   deployment_id: workstation-1
  #   custody: systemd
  #   kek_credential: aegis-kek
