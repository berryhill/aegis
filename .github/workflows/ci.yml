name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.x"

jobs:
  format-build-test-vet:
    name: Format, build, test, and vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Check formatting
        run: test -z "$(gofmt -l ./cmd ./internal)"
      - name: Check module metadata
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: Build
        run: go build ./cmd/aegis
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...

  race:
    name: Race tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go test -race ./...

  vulnerability-scan:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
      - run: govulncheck ./...
